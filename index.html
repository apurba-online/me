<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Alfi ❤️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-color: #ffe6e6;
            overflow: hidden; /* Prevent scrolling */
            touch-action: manipulation;
        }

        .font-hand {
            font-family: 'Indie Flower', cursive;
        }

        /* Floating Hearts Animation */
        .heart-bg {
            position: fixed;
            color: rgba(255, 182, 193, 0.4);
            animation: floatUp linear infinite;
            z-index: 0;
            pointer-events: none;
            user-select: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-20vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        /* Button transition for smooth growing */
        #yesBtn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        #noBtn {
            transition: all 0.2s ease;
            position: relative;
        }

        /* Success Confetti */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
            z-index: 50;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        .wiggle {
            animation: wiggle 0.5s ease-in-out;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }
        
        .fade-in {
            animation: fadeIn 1s ease-in forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center relative selection:bg-pink-200">

    <!-- Background Container -->
    <div id="hearts-container" class="absolute inset-0 overflow-hidden pointer-events-none"></div>

    <!-- Main Card -->
    <div id="main-card" class="relative z-10 bg-white/80 backdrop-blur-md p-8 rounded-3xl shadow-xl max-w-md w-11/12 text-center border-4 border-pink-100 transition-all duration-500">
        
        <!-- Mood Emoji -->
        <div id="mood-display" class="text-8xl mb-6 transition-all duration-300 drop-shadow-sm filter grayscale-0">
            🧸
        </div>

        <!-- Question -->
        <h1 class="text-4xl md:text-5xl font-hand font-bold text-pink-600 mb-4 leading-tight">
            Alfi, will you be my Valentine?
        </h1>

        <!-- Changing Subtext -->
        <p id="subtext" class="text-gray-600 mb-8 text-lg min-h-[3rem] px-4 font-medium flex items-center justify-center">
            I promise to make it special! 🌹
        </p>

        <!-- Buttons Area -->
        <div class="flex flex-col md:flex-row items-center justify-center gap-4 relative min-h-[60px]">
            <button id="yesBtn" class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-8 rounded-full shadow-lg transform hover:scale-105 active:scale-95 text-xl z-20 transition-all">
                Yes! 💖
            </button>
            
            <button id="noBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-8 rounded-full shadow-md transition-colors duration-200 text-xl z-20">
                No
            </button>
        </div>
        
        <!-- Gemini Feature 1: Ask Cupid -->
        <div class="mt-8 pt-4 border-t border-pink-100">
             <button id="askCupidBtn" class="text-pink-400 text-sm font-bold hover:text-pink-600 transition-colors flex items-center justify-center gap-2 mx-auto">
                <span>Need a reason? Ask Cupid</span>
                <span class="text-lg">✨</span>
            </button>
            <p id="cupidResponse" class="hidden mt-3 text-pink-600 font-hand text-xl animate-pulse"></p>
        </div>
    </div>

    <!-- Success Overlay (Hidden by default) -->
    <div id="success-overlay" class="fixed inset-0 bg-pink-500/95 z-50 hidden flex-col items-center justify-center text-white text-center p-4">
        <div class="text-9xl mb-6 animate-bounce">💑</div>
        <h1 class="text-5xl font-hand font-bold mb-4 drop-shadow-md">YAYYYY!</h1>
        <p class="text-2xl max-w-lg leading-relaxed font-medium mb-8">
            I knew you'd say yes, Alfi! <br>
            I love you so much! ❤️
        </p>
        
        <!-- Gemini Feature 2: AI Love Note -->
        <div id="ai-love-note" class="max-w-md bg-white/20 backdrop-blur-md p-6 rounded-xl border border-white/30 hidden">
            <p id="poem-content" class="text-xl italic font-serif leading-relaxed">
                Writing a poem just for you... ✨
            </p>
        </div>
    </div>

    <script>
        // --- Gemini Configuration ---
        const apiKey = ""; // API key is injected at runtime
        
        async function callGemini(prompt) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                
                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error("Gemini Error:", error);
                return null;
            }
        }

        // --- Cupid Feature Logic ---
        const askCupidBtn = document.getElementById('askCupidBtn');
        const cupidResponse = document.getElementById('cupidResponse');

        askCupidBtn.addEventListener('click', async () => {
            // UI Loading State
            askCupidBtn.disabled = true;
            askCupidBtn.innerHTML = "Cupid is thinking... 🤔";
            cupidResponse.classList.remove('hidden');
            cupidResponse.innerText = "...";
            
            const prompt = "Give me one short, funny, charming, and slightly desperate reason why Alfi should say YES to being my Valentine. Keep it under 15 words. Use an emoji.";
            
            const reason = await callGemini(prompt);
            
            askCupidBtn.innerHTML = "Ask Cupid again ✨";
            askCupidBtn.disabled = false;
            
            if (reason) {
                cupidResponse.classList.remove('animate-pulse');
                cupidResponse.innerText = `"${reason.trim()}"`;
            } else {
                cupidResponse.innerText = '"Because he really, really loves you! ❤️"'; // Fallback
            }
        });

        // --- Poem Feature Logic ---
        async function generateLovePoem() {
            const poemContainer = document.getElementById('ai-love-note');
            const poemContent = document.getElementById('poem-content');
            
            poemContainer.classList.remove('hidden');
            poemContainer.classList.add('fade-in');
            
            const prompt = "Write a very short, romantic, 4-line poem for Alfi celebrating that she said Yes to being my Valentine. It should be sweet and use emojis. Do not use Markdown.";
            
            const poem = await callGemini(prompt);
            
            if (poem) {
                poemContent.innerText = poem.trim();
            } else {
                poemContent.innerText = "Roses are red,\nViolets are blue,\nI'm so lucky,\nTo have a Valentine like you! ❤️"; // Fallback
            }
        }

        // --- Existing UI Logic ---
        const messages = [
            "No",
            "Are you sure, Alfi?",
            "Really sure?",
            "Think again!",
            "Last chance!",
            "Surely not?",
            "You might regret this!",
            "Give it another thought!",
            "Are you absolutely certain?",
            "This could be a mistake!",
            "Have a heart!",
            "Don't be so cold!",
            "Change of heart?",
            "Wouldn't you reconsider?",
            "Is that your final answer?",
            "You're breaking my heart ;("
        ];

        const emojis = ["🧸", "🥺", "😢", "😭", "💔", "🥀", "🤕", "😨", "👿"];
        
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const subtext = document.getElementById('subtext');
        const moodDisplay = document.getElementById('mood-display');
        const successOverlay = document.getElementById('success-overlay');
        const heartsContainer = document.getElementById('hearts-container');
        const mainCard = document.getElementById('main-card');

        let clickCount = 0;
        let yesScale = 1;

        function createFloatingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = ['❤️', '💖', '💝', '💕', '🌹'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 6) + 's';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            heartsContainer.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 9000);
        }
        setInterval(createFloatingHeart, 600);

        function handleNoInteraction(e) {
            if (clickCount >= 5) {
                if(e.type === 'touchstart') e.preventDefault();
                moveButton();
                return;
            }
            if (e.type === 'click') {
                clickCount++;
                updateUI();
            }
        }

        function updateUI() {
            const textIndex = Math.min(clickCount, messages.length - 1);
            noBtn.innerText = messages[textIndex];

            const emojiIndex = Math.min(clickCount, emojis.length - 1);
            moodDisplay.innerText = emojis[emojiIndex];
            moodDisplay.classList.remove('wiggle');
            void moodDisplay.offsetWidth; 
            moodDisplay.classList.add('wiggle');

            yesScale += 0.15;
            yesBtn.style.transform = `scale(${yesScale})`;
            
            const currentGap = 16 + (clickCount * 10);
            yesBtn.parentElement.style.gap = `${currentGap}px`;

            const subtextList = [
                "I promise I'll be the best date ever! 🌹",
                "I'll buy you chocolates! 🍫",
                "I'll cook your favorite dinner! 🍝",
                "We can watch whatever movie you want! 🎬",
                "Pretty please with a cherry on top? 🍒",
                "Alfi, don't do this to me! 😫",
                "I'm going to cry... 💧"
            ];
            subtext.innerText = subtextList[Math.min(clickCount, subtextList.length - 1)];
            subtext.style.color = clickCount > 2 ? '#e11d48' : '#4b5563';
        }

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40) + 20;
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        noBtn.addEventListener('click', handleNoInteraction);
        noBtn.addEventListener('mouseover', (e) => {
            if(clickCount >= 5) moveButton();
        });
        noBtn.addEventListener('touchstart', handleNoInteraction);

        // --- Success Handler ---
        yesBtn.addEventListener('click', () => {
            mainCard.style.display = 'none';
            successOverlay.classList.remove('hidden');
            successOverlay.classList.add('flex');
            fireConfetti();
            
            // Trigger AI Poem Generation
            generateLovePoem();
        });

        function fireConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'];
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.animationDuration = Math.random() * 2 + 3 + 's';
                successOverlay.appendChild(confetti);
            }
        }
    </script>
</body>
</html>
